<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <!--link para font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css"
        integrity="sha512-5A8nwdMOWrSz20fDsjczgUidUBR8liPYU+WymTZP1lmY9G6Oc7HlZv156XqnsgNUzTyMefFTcsFH/tnJE/+xBg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <!--final do link para font awesome-->
    <link rel="stylesheet" href="css/index.css" type="text/css">
    <style>
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }
        
    </style>
</head>

<body>
    
    <main>
        <header style="background-image: url('img/background_img.jpg');"><!--inicio do header-->
            <div class="container">
                <nav>

                    <ul class="ul">
                        <li><a href="index.html">HOME</a></li>
                        <li><a href="origem.html">ORIGEM</a></li>
                        <li><a href="historias.html">HISTÓRIAS</a></li>
                        <li><a href="contato.html">CONTATO</a></li>
                        <li><a href="calculadora.html">CALCULADORA</a></li>
                    </ul>

                    <a href="index.html">
                        <img src="img/logo.png" class="logo" alt="logo">
                    </a>

                </nav>

            </div>
            
            <section class="banner">
                <div class="banner_text">
                    <h1>Halloween</h1>
                    <p>Descubra o mistério e a magia do Halloween!</p>
                    <a href="index.html" class="btn animete-btn">Saiba mais</a>
                </div>
            </section>
        </header><!--final do header-->
        
        <div class="calculator">
            <input type="text" class="display" id="display" disabled />
            <div class="buttons">
              <button class="button clear" onclick="clearDisplay()">C</button>
              <button class="button" onclick="appendToDisplay('7')">7</button>
              <button class="button" onclick="appendToDisplay('8')">8</button>
              <button class="button" onclick="appendToDisplay('9')">9</button>
              <button class="button" onclick="appendToDisplay('/')">/</button>
              <button class="button" onclick="appendToDisplay('4')">4</button>
              <button class="button" onclick="appendToDisplay('5')">5</button>
              <button class="button" onclick="appendToDisplay('6')">6</button>
              <button class="button" onclick="appendToDisplay('*')">*</button>
              <button class="button" onclick="appendToDisplay('1')">1</button>
              <button class="button" onclick="appendToDisplay('2')">2</button>
              <button class="button" onclick="appendToDisplay('3')">3</button>
              <button class="button" onclick="appendToDisplay('-')">-</button>
              <button class="button" onclick="appendToDisplay('0')">0</button>
              <button class="button" onclick="appendToDisplay('.')">.</button>
              <button class="button equal" onclick="calculate()">=</button>
              <button class="button" onclick="appendToDisplay('+')">+</button>
            </div>
          </div>

        <footer class="final">
            <div class="container">
                <div class="links">
                    <a href="#"><i class="fa fa-instagram" aria-hidden="true"></i></a>
                    <a href="#"><i class="fa fa-facebook" aria-hidden="true"></i></a>
                    <a href="#"><i class="fa fa-linkedin" aria-hidden="true"></i></a>
                    <a href="#"><i class="fa fa-quora" aria-hidden="true"></i></a>
                </div>
            </div>
        </footer>
    </main>
</body>

<script src="javascript/calculadora.js"></script>

</html>
